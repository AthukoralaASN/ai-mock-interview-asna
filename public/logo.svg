<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFD07A"/>
      <stop offset="50%" stop-color="#D4A437"/>
      <stop offset="100%" stop-color="#A87400"/>
    </linearGradient>
  </defs>

  <!-- Q ring -->
  <circle cx="200" cy="200" r="130"
          fill="none"
          stroke="url(#gold)"
          stroke-width="40"/>

  <!-- Q tail -->
  <path d="M270 270 L330 320 L290 320 L250 280"
        fill="url(#gold)"/>

  <!-- Inner circle (cutout look) -->
  <circle cx="200" cy="200" r="90" fill="white"/>

  <!-- I -->
  <rect x="185" y="130" width="30" height="140"
        fill="url(#gold)"/>
</svg>